<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENGINE GAME</title>

<style>
/* ================= GLOBAL ================= */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Arial;
  background:#020617;
  color:white;
  overflow:hidden;
}

/* ================= BACKGROUND SYSTEM ================= */
canvas{
  position:fixed;
  top:0;left:0;
  z-index:-1;
}

/* ================= LAYOUT ================= */
.app{display:flex;height:100vh}
.sidebar{
  width:240px;
  background:rgba(0,0,0,0.7);
  padding:20px;
}
.main{flex:1;padding:20px;overflow:auto}

button{
  width:100%;
  padding:12px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  cursor:pointer;
}

button:hover{background:#38bdf8;color:black}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

/* ================= GAME OBJECT ================= */
.entity{
  width:80px;
  height:80px;
  border-radius:50%;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}

.enemy{background:#ef4444}
.player{background:#22c55e}

.hpbar{
  height:6px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
  margin-top:5px;
}

.hp{
  height:100%;
  background:#22c55e;
}

/* ================= FLOAT TEXT ================= */
.float{
  position:absolute;
  color:#22c55e;
  animation:floatUp 1s forwards;
}

@keyframes floatUp{
  0%{opacity:1;transform:translateY(0)}
  100%{opacity:0;transform:translateY(-60px)}
}

</style>
</head>

<body>
<canvas id="bg"></canvas>

<div class="app">
<div class="sidebar">
  <h2>ENGINE</h2>
  <button onclick="tab('game')">Game</button>
  <button onclick="tab('battle')">Battle</button>
  <button onclick="tab('shop')">Shop</button>
</div>

<div class="main">

<div id="game" class="page">
  <div class="card">
    <h1 id="coins">0</h1>
    <button onclick="mine()">Mine Coins</button>
  </div>
</div>

<div id="battle" class="page" style="display:none">
  <div class="card">
    <h2>Battle Arena</h2>
    <div id="arena"></div>
  </div>
</div>

<div id="shop" class="page" style="display:none">
  <div class="card">
    <button onclick="upgrade()">Upgrade (+10 dmg)</button>
  </div>
</div>

</div>
</div>

<script>
/* ================= CORE ENGINE ================= */
let coins=0,damage=10;

function update(){coinsEl.innerText=coins}
function mine(){coins+=10;update()}

/* ================= BATTLE SYSTEM ================= */
let player={hp:100,max:100,x:100,y:200}
let enemy={hp:100,max:100,x:400,y:200}

function startBattle(){
  arena.innerHTML='';

  let p=createEntity('player','🧑',player);
  let e=createEntity('enemy','👾',enemy);

  arena.appendChild(p);
  arena.appendChild(e);

  attackLoop(p,e);
}

function createEntity(type,emoji,obj){
  let el=document.createElement('div');
  el.className='entity '+type;
  el.style.left=obj.x+'px';
  el.style.top=obj.y+'px';
  el.innerHTML=emoji+"<div class='hpbar'><div class='hp'></div></div>";
  return el;
}

function attackLoop(p,e){
  let interval=setInterval(()=>{
    enemy.hp-=damage;
    showFloat(enemy.x,enemy.y,'-'+damage);
    updateHP(e,enemy);

    if(enemy.hp<=0){clearInterval(interval);coins+=100;update();}
  },1000);
}

function updateHP(el,obj){
  let hp=el.querySelector('.hp');
  hp.style.width=(obj.hp/obj.max*100)+'%';
}

function showFloat(x,y,text){
  let f=document.createElement('div');
  f.className='float';
  f.style.left=x+'px';
  f.style.top=y+'px';
  f.innerText=text;
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),1000);
}

/* ================= SHOP ================= */
function upgrade(){if(coins>=100){coins-=100;damage+=10;update()}}

/* ================= NAV ================= */
function tab(t){
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  document.getElementById(t).style.display='block';
  if(t==='battle')startBattle();
}

/* ================= BACKGROUND PARTICLES ================= */
const c=document.getElementById('bg');
const ctx=c.getContext('2d');
c.width=window.innerWidth;
c.height=window.innerHeight;

let stars=[];
for(let i=0;i<100;i++){
  stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle='white';
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
    s.y+=0.2;
    if(s.y>c.height)s.y=0;
  });
  requestAnimationFrame(draw);
}

draw();
update();
</script>

</body>
</html>
