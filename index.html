<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTRA GAME X</title>

<style>
/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
  color:white;
  overflow:hidden;
}

/* LAYOUT */
.wrapper{
  display:grid;
  grid-template-columns: 1fr 4fr;
  height:100vh;
}

.sidebar{
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(20px);
  padding:25px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.logo{
  font-size:26px;
  font-weight:bold;
  color:#38bdf8;
  text-align:center;
}

.menu button{
  padding:15px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,0.05);
  color:white;
  cursor:pointer;
  transition:0.2s;
  font-size:16px;
}

.menu button:hover{
  background:#38bdf8;
  color:black;
  transform:scale(1.05);
}

.main{
  position:relative;
  padding:40px;
  overflow-y:auto;
}

/* BACKGROUND FX */
.bg-glow{
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle,#38bdf8,transparent);
  filter:blur(150px);
  top:-200px;
  left:-200px;
  opacity:0.4;
}

/* CARDS */
.card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05);
  padding:25px;
  border-radius:20px;
  margin-bottom:30px;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

/* GAME */
.big-btn{
  width:100%;
  padding:30px;
  font-size:26px;
  border-radius:20px;
  border:none;
  background:linear-gradient(45deg,#22c55e,#4ade80);
  cursor:pointer;
  transition:0.2s;
}

.big-btn:hover{
  transform:scale(1.08);
}

.coins{
  font-size:32px;
  margin-bottom:20px;
  color:#22c55e;
}

/* SHOP */
.item{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  text-align:center;
  transition:0.2s;
}

.item:hover{
  transform:translateY(-5px) scale(1.02);
}

.buy{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  cursor:pointer;
}

/* INVENTORY */
.inv-item{
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  margin:5px 0;
}

/* BATTLEPASS */
.progress{
  height:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#38bdf8,#818cf8);
}

</style>
</head>

<body>
<div class="wrapper">

<div class="sidebar">
  <div class="logo">ULTRA X</div>
  <div class="menu">
    <button onclick="tab('game')">🎮 Game</button>
    <button onclick="tab('shop')">🛒 Shop</button>
    <button onclick="tab('bp')">🎟 Battlepass</button>
    <button onclick="tab('inv')">🎒 Inventory</button>
  </div>
</div>

<div class="main">
<div class="bg-glow"></div>

<div id="game" class="page">
  <div class="card">
    <div class="coins">💰 <span id="coins">0</span></div>
    <button class="big-btn" onclick="clickCoin()">CLICK</button>
  </div>
</div>

<div id="shop" class="page" style="display:none">
  <div class="grid" id="shopGrid"></div>
</div>

<div id="bp" class="page" style="display:none">
  <div class="card">
    <h2>Battlepass</h2>
    <p>Status: <span id="bpStatus">Locked</span></p>
    <div class="progress"><div id="bar" class="bar"></div></div>
    <br>
    <button class="buy" onclick="buyBP()">Unlock 500</button>
  </div>
</div>

<div id="inv" class="page" style="display:none">
  <div class="card">
    <h2>Inventory</h2>
    <div id="invList"></div>
  </div>
</div>

</div>
</div>

<script>
let coins=0;
let xp=0;
let inv=[];
let bp=false;

const items=[
{name:'⚔ Sword',price:200},
{name:'🛡 Shield',price:150},
{name:'💎 Gem',price:800},
{name:'🔥 Boost',price:1000},
{name:'👑 Crown',price:2000}
];

function update(){
  coinsEl.innerText=coins;
  bpStatus.innerText=bp?'Unlocked':'Locked';
  bar.style.width=(xp%100)+'%';
  invList.innerHTML=inv.map(i=>`<div class='inv-item'>${i}</div>`).join('')||'Empty';
}

function clickCoin(){coins+=50;xp+=10;update()}

function buy(i){
  if(coins>=items[i].price){
    coins-=items[i].price;
    inv.push(items[i].name);
    update();
  }
}

function buyBP(){if(coins>=500){coins-=500;bp=true;update()}}

function renderShop(){
  shopGrid.innerHTML='';
  items.forEach((it,i)=>{
    shopGrid.innerHTML+=`
    <div class='item'>
      <h3>${it.name}</h3>
      <p>${it.price}</p>
      <button class='buy' onclick='buy(${i})'>Buy</button>
    </div>`;
  });
}

function tab(t){
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  document.getElementById(t).style.display='block';
}

renderShop();
update();
</script>

</body>
</html>
