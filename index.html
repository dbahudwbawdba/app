<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTRA GAME</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  overflow: hidden;
}

.container {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 260px;
  background: rgba(2,6,23,0.9);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-right: 1px solid rgba(255,255,255,0.05);
}

.logo {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 30px;
  color: #38bdf8;
}

.menu button {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border: none;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.menu button:hover {
  background: #38bdf8;
  color: black;
  transform: scale(1.05);
}

.main {
  flex: 1;
  padding: 30px;
  overflow-y: auto;
}

.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 25px;
  margin-bottom: 25px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

h2 {
  margin-top: 0;
}

.coins {
  font-size: 28px;
  color: #22c55e;
}

.big-btn {
  width: 100%;
  padding: 25px;
  font-size: 22px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(45deg,#22c55e,#4ade80);
  cursor: pointer;
  transition: 0.2s;
}

.big-btn:hover {
  transform: scale(1.05);
}

.shop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
  gap: 20px;
}

.shop-item {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 15px;
  text-align: center;
}

.buy {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  cursor: pointer;
}

.progress {
  height: 20px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#38bdf8,#818cf8);
}

</style>
</head>

<body>
<div class="container">

<div class="sidebar">
  <div class="logo">ULTRA GAME</div>
  <div class="menu">
    <button onclick="showTab('game')">🎮 Game</button>
    <button onclick="showTab('shop')">🛒 Shop</button>
    <button onclick="showTab('battlepass')">🎟️ Battlepass</button>
    <button onclick="showTab('inventory')">🎒 Inventory</button>
  </div>
</div>

<div class="main">

<div id="game" class="tab">
  <div class="card">
    <h2>Clicker Engine</h2>
    <div class="coins">💰 <span id="coins">0</span></div>
    <br>
    <button class="big-btn" onclick="earnCoins()">CLICK TO FARM</button>
  </div>
</div>

<div id="shop" class="tab" style="display:none">
  <div class="card">
    <h2>Shop</h2>
    <div class="shop-grid" id="shopItems"></div>
  </div>
</div>

<div id="battlepass" class="tab" style="display:none">
  <div class="card">
    <h2>Battlepass</h2>
    <p>Status: <span id="bpStatus">Locked</span></p>
    <div class="progress"><div id="xpBar" class="progress-bar"></div></div>
    <br>
    <button class="buy" onclick="buyBattlepass()">Unlock (500)</button>
  </div>
</div>

<div id="inventory" class="tab" style="display:none">
  <div class="card">
    <h2>Inventory</h2>
    <div id="inventoryList"></div>
  </div>
</div>

</div>
</div>

<script>
let coins = 0;
let xp = 0;
let inventory = [];
let battlepass = false;

const items = [
  { name: '⚔️ Sword', price: 200 },
  { name: '🛡️ Shield', price: 150 },
  { name: '✨ Neon Skin', price: 500 },
  { name: '🔥 Booster', price: 1000 }
];

function updateUI() {
  document.getElementById('coins').innerText = coins;
  document.getElementById('bpStatus').innerText = battlepass ? 'Unlocked' : 'Locked';
  document.getElementById('xpBar').style.width = (xp % 100) + '%';

  document.getElementById('inventoryList').innerHTML = inventory.length
    ? inventory.join('<br>')
    : 'Empty';
}

function earnCoins() {
  coins += 50;
  xp += 10;
  updateUI();
}

function buyItem(i) {
  let item = items[i];
  if (coins >= item.price) {
    coins -= item.price;
    inventory.push(item.name);
    updateUI();
  }
}

function buyBattlepass() {
  if (coins >= 500 && !battlepass) {
    coins -= 500;
    battlepass = true;
    updateUI();
  }
}

function renderShop() {
  let shop = document.getElementById('shopItems');
  shop.innerHTML = '';
  items.forEach((item,i)=>{
    shop.innerHTML += `
    <div class="shop-item">
      <h3>${item.name}</h3>
      <p>${item.price} coins</p>
      <button class="buy" onclick="buyItem(${i})">Buy</button>
    </div>`;
  });
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t=>t.style.display='none');
  document.getElementById(tab).style.display='block';
}

renderShop();
updateUI();
</script>

</body>
