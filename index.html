<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTRA GAME GOD MODE</title>

<style>
/* ===== GLOBAL RESET ===== */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: 'Segoe UI', sans-serif;
  background:#020617;
  color:white;
  overflow:hidden;
}

/* ===== ANIMATED BACKGROUND ===== */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  overflow:hidden;
  z-index:-1;
}

.blob{
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle,#38bdf8,transparent);
  filter:blur(120px);
  animation: float 20s infinite alternate;
}

.blob:nth-child(2){background:#22c55e;left:60%;top:40%}
.blob:nth-child(3){background:#818cf8;left:20%;top:60%}

@keyframes float{
  0%{transform:translateY(0px) translateX(0px)}
  100%{transform:translateY(-100px) translateX(80px)}
}

/* ===== LAYOUT ===== */
.app{
  display:flex;
  height:100vh;
}

.sidebar{
  width:260px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(20px);
  padding:20px;
}

.logo{
  font-size:26px;
  text-align:center;
  margin-bottom:20px;
  background:linear-gradient(45deg,#38bdf8,#22c55e);
  -webkit-background-clip:text;
  color:transparent;
}

.nav button{
  width:100%;
  padding:15px;
  margin-bottom:10px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.nav button:hover{
  background:#38bdf8;
  color:black;
  transform:scale(1.05);
}

.main{
  flex:1;
  padding:30px;
  overflow:auto;
}

/* ===== CUSTOM ICON (SVG) ===== */
.icon{
  width:60px;
  height:60px;
  margin:auto;
}

/* ===== CARD ===== */
.card{
  background:rgba(255,255,255,0.03);
  border-radius:20px;
  padding:25px;
  margin-bottom:20px;
  box-shadow:0 0 50px rgba(0,0,0,0.7);
}

/* ===== GAME BUTTON ===== */
.big{
  width:100%;
  padding:30px;
  font-size:26px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#22c55e,#4ade80);
  cursor:pointer;
  transition:0.2s;
}

.big:active{
  transform:scale(0.95);
}

/* ===== PARTICLE ===== */
.particle{
  position:absolute;
  width:10px;
  height:10px;
  background:#22c55e;
  border-radius:50%;
  pointer-events:none;
  animation: pop 1s forwards;
}

@keyframes pop{
  0%{opacity:1;transform:scale(1)}
  100%{opacity:0;transform:translateY(-100px) scale(2)}
}

/* ===== SHOP GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.item{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  text-align:center;
  transition:0.2s;
}

.item:hover{
  transform:scale(1.05);
}

.buy{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#38bdf8;
}

/* ===== PROGRESS BAR ===== */
.barwrap{
  height:25px;
  background:rgba(255,255,255,0.1);
  border-radius:20px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#38bdf8,#818cf8);
  transition:0.3s;
}

</style>
</head>

<body>
<div class="bg">
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
</div>

<div class="app">

<div class="sidebar">
  <div class="logo">ULTRA GOD</div>
  <div class="nav">
    <button onclick="tab('game')">GAME</button>
    <button onclick="tab('shop')">SHOP</button>
    <button onclick="tab('bp')">BATTLEPASS</button>
    <button onclick="tab('inv')">INVENTORY</button>
  </div>
</div>

<div class="main">

<div id="game" class="page">
  <div class="card">
    <h2>CORE ENGINE</h2>
    <h1 id="coins">0</h1>
    <button class="big" onclick="clickCoin(event)">CLICK CORE</button>
  </div>
</div>

<div id="shop" class="page" style="display:none">
  <div class="grid" id="shopGrid"></div>
</div>

<div id="bp" class="page" style="display:none">
  <div class="card">
    <h2>BATTLEPASS</h2>
    <div class="barwrap"><div id="bar" class="bar"></div></div>
    <p id="bpStatus">LOCKED</p>
    <button class="buy" onclick="buyBP()">UNLOCK</button>
  </div>
</div>

<div id="inv" class="page" style="display:none">
  <div class="card" id="invList"></div>
</div>

</div>
</div>

<script>
let coins=0,xp=0,bp=false,inv=[];

const items=[
{name:'⚔',price:200},
{name:'🛡',price:150},
{name:'💎',price:500},
{name:'🔥',price:1000},
{name:'👑',price:2000}
];

function update(){
  coinsEl.innerText=coins;
  bar.style.width=(xp%100)+'%';
  bpStatus.innerText=bp?'UNLOCKED':'LOCKED';
  invList.innerHTML=inv.join(' ')||'EMPTY';
}

function clickCoin(e){
  coins+=50;xp+=10;
  spawnParticles(e.clientX,e.clientY);
  update();
}

function spawnParticles(x,y){
  for(let i=0;i<10;i++){
    let p=document.createElement('div');
    p.className='particle';
    p.style.left=x+'px';
    p.style.top=y+'px';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}

function buy(i){
  if(coins>=items[i].price){coins-=items[i].price;inv.push(items[i].name);update()}
}

function buyBP(){if(coins>=500){coins-=500;bp=true;update()}}

function renderShop(){
  shopGrid.innerHTML='';
  items.forEach((it,i)=>{
    shopGrid.innerHTML+=`<div class='item'><h1>${it.name}</h1><p>${it.price}</p><button class='buy' onclick='buy(${i})'>BUY</button></div>`;
  });
}

function tab(t){
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  document.getElementById(t).style.display='block';
}

renderShop();update();
</script>

</body>
</html>
